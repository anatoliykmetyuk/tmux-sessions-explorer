name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build app (electron-vite)
        run: npm run build

      - name: Package macOS (arm64)
        run: npx electron-builder --mac dmg zip --arm64 --publish never

      - uses: actions/upload-artifact@v6
        with:
          name: mac-arm64
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

  build-x64:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build app (electron-vite)
        run: npm run build

      - name: Package macOS (x64)
        run: npx electron-builder --mac dmg zip --x64 --publish never

      - uses: actions/upload-artifact@v6
        with:
          name: mac-x64
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

  publish:
    needs: [build-arm64, build-x64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.zip
